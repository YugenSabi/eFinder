version: v1.1.0

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://localhost:3000/
  allowed_return_urls:
    - http://localhost:3000

  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false

  flows:
    error:
      ui_url: http://localhost:3000/auth/error

    login:
      ui_url: http://localhost:3000/auth/login
      lifespan: 10m

    registration:
      ui_url: http://localhost:3000/auth/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session

    verification:
      enabled: true
      ui_url: http://localhost:3000/auth/verification
      lifespan: 1h
      use: code
      after:
        default_browser_return_url: http://localhost:3000/

    recovery:
      enabled: true
      ui_url: http://localhost:3000/auth/recovery
      lifespan: 1h
      use: code

    logout:
      after:
        default_browser_return_url: http://localhost:3000/auth/login

    settings:
      ui_url: http://localhost:3000/settings
      privileged_session_max_age: 15m

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - EFINDER-COOKIE-SECRET-CHANGE-ME-IN-PRODUCTION-123456789
  cipher:
    - efndr-cipher-key-32-chars-123456

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://mailhog:1025/?disable_starttls=true
    from_address: noreply@efinder.local
    from_name: eFinder Identity

session:
  lifespan: 24h
  cookie:
    domain: localhost
    same_site: Lax
