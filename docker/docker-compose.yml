services:
  postgres:
    image: postgres:16
    container_name: efinder_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - efinder_postgres_data:/var/lib/postgresql/data
    networks:
      - efinder_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d efinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  kratos-migrate:
    image: oryd/kratos:v1.1.0
    container_name: efinder_kratos_migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DSN: ${KRATOS_DSN}
    volumes:
      - ./kratos:/etc/config/kratos
    command: migrate sql -e --yes
    networks:
      - efinder_network

  kratos:
    image: oryd/kratos:v1.1.0
    container_name: efinder_kratos
    restart: unless-stopped
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DSN: ${KRATOS_DSN}
    volumes:
      - ./kratos:/etc/config/kratos
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    ports:
      - "${KRATOS_PUBLIC_PORT:-4433}:4433"
      - "${KRATOS_ADMIN_PORT:-4434}:4434"
    networks:
      - efinder_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: efinder_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - efinder_network

volumes:
  efinder_postgres_data:

networks:
  efinder_network:
    driver: bridge
